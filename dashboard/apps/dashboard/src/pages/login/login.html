<div class="login-container">
  <div class="login-box">
    <h2>رمز الدخول</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="input-group">
        <input type="password" name="accessCode" [(ngModel)]="accessCode" placeholder="********" required />
      </div>

      <button type="submit" class="login-btn" [disabled]="!checkCode()">ادخل</button>
    </form>
  </div>
</div>
