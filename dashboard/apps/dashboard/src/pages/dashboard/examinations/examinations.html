<div class="dashboard-container">
  <div class="header">
    <div class="header-title">
      <i class="fa-solid fa-user-plus"></i>
      <h1>لوحة المعاينات</h1>
    </div>
   
     <div class="stats">
      <div class="stat-card">
        <h2>إجمالي المعاينات</h2>
      <div class="big-number">{{ totalFilteredCount() }}</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="month-filter">
          <span class="label">اختر الشهر:</span>
          <input
            type="month"
            [value]="selectedMonth()"
            (change)="onMonthChange($event)"
          />
        </div>
      </div>
    </div>
  </div>
  <div class="search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input
      type="search"
      name="searchDoctor"
      [(ngModel)]="searchDoctor"
      placeholder="ابحث عن  طبيب..."
    />
  </div>
  <div class="doctors-grid">
    @for (doctor of groupedByDoctor() | searchDoctorName : searchDoctor; track
    doctor.doctorId) {
    <div class="doctor-card">
      <h3>{{ doctor.doctorName }}</h3>
      <div class="doctor-count">{{ doctor.count }} معاينة</div>
    </div>
    }
  </div>
</div>
