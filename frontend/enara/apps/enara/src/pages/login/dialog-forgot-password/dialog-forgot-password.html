<div class="email-dialog">
  <h2 class="title">{{translate.t("dialog-forgot-password.title")}}</h2>

  <p class="subtitle">{{translate.t("dialog-forgot-password.subtitle")}}</p>

  <input
    type="email"
    name="email"
    [(ngModel)]="email"
    placeholder="{{translate.t('dialog-forgot-password.email_placeholder')}}"
    class="email-input"
    required
  />

  <div class="actions">
    <button class="btn cancel" mat-button mat-dialog-close>
      {{translate.t("dialog-forgot-password.cancel_button")}}
    </button>
    <button class="btn send" (click)="onSendEmail()">
      {{translate.t("dialog-forgot-password.send_button")}}
    </button>
  </div>
</div>
