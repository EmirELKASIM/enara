<div class="reset-container">
  <div class="reset-card">
    <h2>{{translate.t("reset_password.title")}}</h2>
    <p>{{translate.t("reset_password.subtitle")}}</p>

    <input
      type="password"
      placeholder="{{translate.t('reset_password.new_password_placeholder')}}"
      [(ngModel)]="newPassword"
      name="newPassword"
      required
    />

    <input
      type="password"
      placeholder="{{translate.t('reset_password.confirm_password_placeholder')}}"
      [(ngModel)]="confirmPassword"
      name="confirmPassword"
      required
    />

    <button class="reset-btn" (click)="submit()">
      {{translate.t("reset_password.reset_button")}}
    </button>

    <button class="back-link" (click)="returnLogin()">
      {{translate.t("reset_password.back_login")}}
    </button>
  </div>
</div>
